<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetCrico</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(209, 73, 91, 0.18), transparent 35%),
          linear-gradient(180deg, #111418 0%, #0d0f13 100%);
      }

      #startup-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(209, 73, 91, 0.22), transparent 34%),
          linear-gradient(180deg, #111418 0%, #0d0f13 100%);
        color: #f7f7f5;
        transition: opacity 220ms ease, visibility 220ms ease;
      }

      #startup-splash.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #startup-splash__inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      }

      #startup-splash__brand {
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      #startup-splash__label {
        font-size: 12px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(247, 247, 245, 0.7);
      }

      #startup-splash__bar {
        width: 124px;
        height: 4px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
      }

      #startup-splash__bar::after {
        content: "";
        display: block;
        width: 44%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(237, 174, 73, 0.95), rgba(209, 73, 91, 0.95));
        animation: startup-loading 1s ease-in-out infinite;
      }

      @keyframes startup-loading {
        0% {
          transform: translateX(-120%);
        }

        50% {
          transform: translateX(95%);
        }

        100% {
          transform: translateX(220%);
        }
      }
    </style>
  </head>
  <body>
    <div id="startup-splash" aria-hidden="true">
      <div id="startup-splash__inner">
        <div id="startup-splash__brand">NetCrico</div>
        <div id="startup-splash__bar"></div>
        <div id="startup-splash__label">Carregando biblioteca</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
